<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <title>My Profile</title>
</head>

<body class="bg-gray-100">

<header
  class="bg-zinc-900 text-white px-4 py-4 shadow-md"
>

  <div
    class="max-w-6xl mx-auto flex justify-between items-center"
  >

    <div>

      <h1 class="text-xl font-bold">
        The Golden Crust Pizza
      </h1>

      <p class="text-yellow-400 text-sm">
        Order & Delivery • Pickup Available
      </p>

    </div>

    <a
      href="index.html"
      class="bg-yellow-400 text-black px-4 py-2 rounded-xl font-semibold"
    >
      ← Back
    </a>

  </div>

</header>

<main class="max-w-3xl mx-auto p-6">

  <div
    class="bg-white rounded-3xl shadow-lg p-6"
  >

    <div class="text-center">

      <div
        class="w-24 h-24 mx-auto rounded-full bg-yellow-400 flex items-center justify-center text-4xl"
      >
        👤
      </div>

      <h1
        class="text-3xl font-bold mt-4"
      >
        My Profile
      </h1>

    </div>

    <div
      id="profileContainer"
      class="mt-8"
    >

      Loading...

    </div>
    
    <button
  id="editProfileBtn"
  class="mt-6 w-full bg-yellow-400 text-black font-bold py-3 rounded-2xl"
>
  Edit Profile
</button>

  </div>
  
  <div class="mt-8 border-t pt-6">

  <h2 class="text-xl font-bold">
    Security
  </h2>

  <button
    id="changePasswordBtn"
    class="mt-4 w-full bg-black text-white py-3 rounded-2xl font-bold"
  >
    Change Password
  </button>

  <div
    id="passwordSection"
    class="hidden mt-4 space-y-4"
  >

    <input
      id="currentPassword"
      type="password"
      placeholder="Current Password"
      class="w-full border rounded-xl p-3"
    >

    <input
      id="newPassword"
      type="password"
      placeholder="New Password"
      class="w-full border rounded-xl p-3"
    >

    <input
      id="confirmPassword"
      type="password"
      placeholder="Confirm New Password"
      class="w-full border rounded-xl p-3"
    >

    <button
      id="savePasswordBtn"
      class="w-full bg-yellow-400 py-3 rounded-xl font-bold"
    >
      Save Password
    </button>

  </div>

</div>

</main>

<script src="./js/config.js"></script>
<script src="./js/profile.js"></script>

</body>
</html>
