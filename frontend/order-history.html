<html lang="en">

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Order History</title>
</head>

<body class="bg-gray-100">

  <main class="max-w-6xl mx-auto px-4 py-8">

    <div class="bg-stone-50 rounded-3xl p-6 shadow">

      <span

               rounded-full
               px-4 py-2

        ORDER HISTORY
      </span>

      <h1
        class="text-4xl

               mt-6"

      </p>

    </div>

    <div

      class="mt-8"
    >
    </div>

  </main>

</html>
