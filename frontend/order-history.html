<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <script src="https://cdn.tailwindcss.com"></script>

  <title>Order History</title>
</head>

<body class="bg-gray-100">

<header
  class="bg-zinc-900
         text-white
         px-4 py-4
         shadow-md"
>

  <div
    class="max-w-6xl
           mx-auto
           flex
           items-center
           justify-between"
  >

    <div>

      <h1
        class="text-xl
               font-bold"
      >
        The Golden Crust Pizza
      </h1>

      <p
        class="text-yellow-400
               text-sm"
      >
        Order & Delivery • Pickup Available
      </p>

    </div>

    <a
      href="index.html"
      class="bg-yellow-400
             text-black
             px-4 py-2
             rounded-xl
             font-semibold"
    >
      ← Back
    </a>

  </div>

</header>

  <main class="max-w-6xl mx-auto px-4 py-8">

    <div class="bg-stone-50 rounded-3xl p-6 shadow">

      <span
        class="border border-yellow-300
               rounded-full
               px-4 py-2
               text-yellow-600
               font-semibold"
      >
        ORDER HISTORY
      </span>

      <h1
        class="text-4xl
               font-bold
               mt-6"
      >
        My Orders
      </h1>

      <p
        class="text-gray-500
               mt-2"
      >
        View your previous orders
      </p>

    </div>

    <div
  id="ordersContainer"
  class="mt-8 space-y-6"
>

  <div
    class="bg-white
           rounded-3xl
           p-6
           shadow"
  >

    <div
      class="flex
             justify-between
             items-center"
    >

      <div>

        <h2
          class="text-xl
                 font-bold"
        >
          Order #16
        </h2>

        <p
          class="text-gray-500"
        >
          June 4, 2026
        </p>

      </div>

      <span
        class="bg-yellow-100
               text-yellow-700
               px-3 py-1
               rounded-full"
      >
        COD
      </span>

    </div>

    <div
      class="mt-4
             space-y-2"
    >

      <p>
        Pepperoni Pizza × 2
      </p>

      <p>
        Hawaiian Pizza × 1
      </p>

    </div>

    <div
      class="mt-4
             font-bold
             text-lg"
    >
      Total: ₱1357
    </div>

  </div>

</div>

  </main>

</body>
</html>
